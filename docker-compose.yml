services:
  db:
    image: postgres:16-alpine
    container_name: studycanvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studycanvas
      POSTGRES_PASSWORD: studycanvas
      POSTGRES_DB: studycanvas
    ports:
      - "5432:5432"
    volumes:
      - studycanvas_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studycanvas -d studycanvas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  studycanvas_pg_data:
